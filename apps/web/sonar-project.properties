sonar.organization=1-family-tree
sonar.projectKey=family_tree_web_key
sonar.projectName=Family Tree Web

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx
sonar.exclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx,**/node_modules/**,**/dist/**,src/test/**

# Unit (vite.config.ts) + integration (vitest.integration.config.ts) lcov are merged by Sonar.
sonar.javascript.lcov.reportPaths=../../coverage/apps/web/lcov.info,../../coverage/apps/web-integration/lcov.info
# .tsx presentation components are exercised by Playwright E2E, which cannot
# emit lcov — exclude them from the coverage metric (not from analysis).
sonar.coverage.exclusions=**/*.tsx
sonar.typescript.tsconfigPath=tsconfig.app.json
sonar.sourceEncoding=UTF-8
