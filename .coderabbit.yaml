# CodeRabbit AI Code Review Configuration
# Stack: NestJS (API) + React/Effector (Web) + Nx Monorepo + Drizzle ORM + PostgreSQL
# Tooling: Biome, Vitest, Jest, Tailwind v4, Rspack, Zod, Passport, Sentry
# Place this file at the root of your repository as `.coderabbit.yaml`

# ─────────────────────────────────────────────
# 1. LANGUAGE & TONE
# ─────────────────────────────────────────────
language: "en-US"
tone_instructions: "Be concise and constructive. Focus on correctness, security, and maintainability. Skip stylistic nitpicks — Biome handles formatting."

# ─────────────────────────────────────────────
# 2. REVIEWS
# ─────────────────────────────────────────────
reviews:
  profile: "assertive" # Thorough reviews — this is a full-stack monorepo
  request_changes_workflow: false
  poem: false
  collapse_walkthrough: false

  # Auto-approve when review is clean and all comments are resolved
  auto_approve:
    enabled: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "DRAFT"

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "develop"
      - "feature/.*" # PRs targeting a feature branch (e.g. sub-feature merges)
      - "bugfix/.*"
      - "hotfix/.*"
      - "test/.*"

  # ── Ignore generated / non-reviewable files ──
  path_filters:
    - "!**/*.lock"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.next/**"
    - "!**/coverage/**"
    - "!**/node_modules/**"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/__snapshots__/**"
    - "!**/*.generated.ts"
    - "!**/biome.json" # Biome config, no need to review
    - "!.claude/**"   # Claude Code context files, not production code

  # ── Per-path targeted instructions ──
  path_instructions:
    # --- NestJS Backend (apps/api) ---
    - path: "apps/api/**/*.ts"
      instructions: |
        This is a NestJS v11 backend.

        **Route isolation (Phase 2+):** Routes are split into three prefixes:
        - Bare `/family-trees/:id` — owner only (`OwnerGuard` after `JWTAuthGuard`)
        - `/family-trees/public/:id` — anonymous read (`PublicGuard`, no JWT required)
        - `/family-trees/shared/:id` — shared-user access (`SharedAccessGuard` after `JWTAuthGuard`)
        Each prefix has its own dedicated guard. `FamilyTreeAccessGuard` is retained for backwards-compat reference only — the shared-users RBAC PUT now uses `OwnerGuard` directly.

        **Global guards:** All DB-backed guards (`OwnerGuard`, `PublicGuard`, `SharedAccessGuard`, `FamilyTreeAccessGuard`) are provided globally via `common/common.module.ts` (`@Global()`). Feature modules do NOT need to list these in their `providers[]` — do NOT flag missing guard providers in feature modules.

        **Naming convention:** Everything follows `FamilyTree[Domain][Scope]` — controllers, services, DTOs, Zod schemas, inferred TS types. Domain: `Member`, `MemberConnection`, `Shared`. Scope: `Owner`, `Public`, `Shared`. Method names are exempt. Examples: `FamilyTreeOwnerController`, `FamilyTreeMemberConnectionSharedController`, `FamilyTreeSharedService`, `FamilyTreeSharedCreateRequestSchema`.

        **RBAC decorator:** `@RequirePermission('canAddMembers', ...)` uses `SHARED_TREE_PERMISSION_KEY` from `~/utils/constants`. The key must NOT be inlined in decorator files.

        **Swagger imports:** Always import from `@nestjs/swagger` (the public API), never from `@nestjs/swagger/dist/decorators` or any internal path.

        General:
        - Ensure all route handlers have proper Guards (JWT/Google OAuth via Passport).
        - Check that DTOs use nestjs-zod / Zod schemas for validation — not plain class-validator.
        - Flag any missing @ApiProperty() decorators on Swagger-exposed DTOs.
        - Verify throttler decorators are applied on sensitive or public endpoints.
        - Look for missing error handling: unhandled promise rejections, missing try/catch in async methods.
        - Flag direct use of `req.user` without type assertion or a typed decorator.
        - Ensure Sentry is capturing exceptions where appropriate (SentryService or filter).

    - path: "apps/api/**/auth/**"
      instructions: |
        This is the authentication module.
        - Pay very close attention to JWT secret handling, token expiry, and refresh token rotation.
        - Ensure Google OAuth2 callback validates state parameter to prevent CSRF.
        - Flag hardcoded secrets or credentials of any kind.
        - Verify cookie settings: httpOnly, secure, sameSite flags on JWT cookies.
        - Check that passport strategies handle invalid credentials consistently (return null/false or throw UnauthorizedException, per project convention).

    - path: "apps/api/**/schema*"
      instructions: |
        This is a Drizzle ORM schema file.
        - Verify that foreign keys have explicit onDelete/onUpdate behavior defined.
        - Check for missing indexes on columns used in WHERE clauses or JOINs.
        - Flag nullable columns that probably should be NOT NULL.
        - Ensure timestamps have defaultNow() and are typed correctly.

    - path: "apps/api/**/*.sql"
      instructions: |
        - Check for SQL injection risks if raw queries are used.
        - Flag missing indexes on filtered or joined columns.
        - Warn about N+1 patterns or unbounded queries without LIMIT.

    - path: "apps/api/**/guards/**"
      instructions: |
        These are NestJS guards for the route isolation layer.
        - `OwnerGuard`: must verify `createdBy === req.user.id`; return 404 for missing trees, 403 for non-owners.
        - `PublicGuard`: no JWT required; must return 404 for both missing AND non-public trees (not 403 — prevents ID probing).
        - `SharedAccessGuard`: must explicitly reject owners before checking `shared_family_trees` record (owners use the bare path, not `/shared`). Check `requiredPermissions` flags against the record.
        - Never auto-create `shared_family_trees` rows inside a guard or read-path service — that is a privilege escalation vector.

    # --- React Frontend (apps/web) ---
    - path: "apps/web/**/*.tsx"
      instructions: |
        This is a React 18 frontend using Effector for state management and Ant Design + Tailwind v4 for UI.
        - Check React hooks rules: no conditional hooks, correct dependency arrays in useEffect/useCallback/useMemo.
        - Flag missing `key` props in list renders.
        - Ensure accessibility: interactive elements should have aria labels, buttons (especially icon-only) should not be plain divs and must have aria-label.
        - Flag direct DOM manipulation or use of `document` / `window` without SSR guards.
        - For Ant Design forms, prefer react-hook-form + @hookform/resolvers with Zod schemas — flag manual validation.

    - path: "apps/web/**/model*"
      instructions: |
        This is an Effector model file (stores, events, effects).
        - Ensure effects (createEffect / attach) have BOTH done/doneData AND fail/failData handlers. Missing fail handlers leave the UI in a stale loading or empty state on error.
        - Flag stores that hold server data without a reset/reinit on route leave (clock: pageRoute.closed).
        - Check that patronum helpers (pending, condition, etc.) are used where applicable to reduce boilerplate.
        - Verify no business logic leaks into UI components — it should live in model files.
        - For the tree-list page factory: public mode (`initialMode: 'public-trees'`) must use `route.opened` as the clock (not `authorizedRoute.opened`) so anonymous users can load the public list.
        - `$loading` stores in tree-detail models must include ALL fetch effect `.pending` flags (tree + members + connections).

    - path: "apps/web/**/router*"
      instructions: |
        This is an atomic-router routing file.
        - Ensure route guards check auth state before navigation.
        - Flag routes missing chainRoute for protected pages.
        - Literal paths (e.g. `/family-trees/public`, `/family-trees/shared`) MUST be listed before parameterized paths (e.g. `/family-trees/:id`) in routesMap — otherwise the param route swallows the literals.

    - path: "apps/web/**/api/**"
      instructions: |
        These are Axios API client modules.
        - URL query parameters that come from user input (e.g. `name`) must be encoded with `encodeURIComponent` or built via `URLSearchParams` — never interpolated raw.
        - Scoped API URLs follow prefix-before-id: `/family-trees${scopeSegment(scope)}/${id}/members`.

    # --- Shared Libraries (libs/) ---
    - path: "libs/**/*.ts"
      instructions: |
        This is a shared library consumed by both API and Web.
        - Be strict about type safety — no implicit `any`, no type assertions without comments.
        - Ensure exports are tree-shakeable (named exports preferred over default).
        - Flag any Node.js-specific or browser-specific APIs — shared libs must be isomorphic.

    # --- Tests ---
    - path: "**/*.spec.ts"
      instructions: |
        NestJS unit/integration tests using Jest.
        - Verify mocks properly reset between tests.
        - Flag tests that test implementation details instead of behavior.
        - Ensure guards and interceptors are tested in integration tests, not just unit-mocked away.

    - path: "**/*.test.ts"
      instructions: |
        Vitest tests (likely frontend/shared libs).
        - Flag empty tests or tests with no assertions.
        - Check for meaningful coverage of edge cases and error paths.
        - Prefer Testing Library queries (getByRole, getByLabelText) over getByTestId.

    # --- Infrastructure / Config ---
    - path: "apps/api/docker-compose*"
      instructions: |
        - Ensure Redis and Postgres services have proper healthchecks.
        - Flag exposed ports that shouldn't be public in production.
        - Check for hardcoded passwords or secrets — these should reference env variables.

    - path: "**/*.env*"
      instructions: |
        - NEVER approve .env files containing real secrets committed to the repo.
        - Ensure .env.example exists and is kept in sync.

    - path: "**"
      instructions: |
        This is a family-tree NX monorepo with two apps:
        - `apps/api`: NestJS v11 REST API with Drizzle ORM + PostgreSQL, Redis cache (Keyv), Cloudflare R2 (S3-compatible media storage), Passport JWT + Google OAuth2, Swagger, Sentry, Throttler.
        - `apps/web`: React 18 SPA with Effector state management, Ant Design + Tailwind v4 UI, atomic-router, react-hook-form + Zod, family-chart for interactive tree visualization, Rspack bundler.

        General rules:
        - Biome handles all formatting and basic linting — do NOT comment on formatting.
        - All validation must use Zod schemas (nestjs-zod on backend, @hookform/resolvers on frontend).
        - TypeScript strict mode is enabled — flag any `any`, non-null assertions without justification, or type casting without a comment.
        - Nx affected commands are used for CI — do not suggest changes that break project boundaries.
        - pnpm is the package manager — flag any npm/yarn usage in scripts.
        - Security is a priority: JWT, OAuth2, Cloudflare R2 presigned URLs, rate limiting — review these areas carefully.
        - Never auto-create database rows inside read-path service methods — this can be a privilege escalation vector.

# ─────────────────────────────────────────────
# 3. CHAT
# ─────────────────────────────────────────────
chat:
  auto_reply: true

# ─────────────────────────────────────────────
# 4. KNOWLEDGE BASE
# ─────────────────────────────────────────────
knowledge_base:
  learnings:
    scope: auto
  pull_requests:
    scope: auto
